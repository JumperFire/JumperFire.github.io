<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltuhr - Digital World Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            color: #00ff88;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff88;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #00cc66;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls input {
            padding: 10px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            border-radius: 5px;
            font-size: 1em;
        }

        .controls input::placeholder {
            color: #00cc66;
            opacity: 0.7;
        }

        button {
            padding: 10px 25px;
            background: #00ff88;
            color: #0f0f23;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        button:hover {
            background: #00dd77;
            box-shadow: 0 0 10px #00ff88;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .reset-btn {
            background: #ff6b6b;
            color: white;
        }

        .reset-btn:hover {
            background: #ee5a52;
            box-shadow: 0 0 10px #ff6b6b;
        }

        .format-toggle {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .format-toggle label {
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .format-toggle input {
            display: none;
        }

        .format-toggle input:checked + label {
            background: #00ff88;
            color: #0f0f23;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.2), transparent);
            transition: left 0.5s;
        }

        .clock-card:hover::before {
            left: 100%;
        }

        .clock-card:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: translateY(-5px);
        }

        .clock-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .city-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 5px #00ff88;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            margin: 15px 0;
            letter-spacing: 2px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-family: 'Courier New', monospace;
        }

        .date-display {
            font-size: 0.9em;
            color: #00cc66;
            margin-bottom: 8px;
        }

        .utc-offset {
            font-size: 0.85em;
            color: #00aa55;
            opacity: 0.8;
        }

        .delete-hint {
            font-size: 0.75em;
            color: #ff6b6b;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .clock-card:hover .delete-hint {
            opacity: 1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #00cc66;
        }

        .empty-state p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            color: #00aa55;
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls input,
            button {
                width: 100%;
            }

            .time-display {
                font-size: 2em;
            }

            .controls {
                gap: 8px;
            }
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 10px #00ff88;
            }
            50% {
                text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88;
            }
        }

        .time-display.pulse {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ WELTUHR</h1>
        <p class="subtitle">Digital World Clock - Mehrere Zeitzonen in Echtzeit</p>

        <div class="controls">
            <div class="format-toggle">
                <input type="radio" id="format24" name="format" value="24" checked>
                <label for="format24">24h</label>
                <input type="radio" id="format12" name="format" value="12">
                <label for="format12">12h (AM/PM)</label>
            </div>
            <input type="number" id="tzInput" placeholder="UTC Offset eingeben (z.B. +1, -5)" min="-12" max="14" step="0.5">
            <button onclick="addTimezone()">➕ Zeitzone hinzufügen</button>
            <button class="reset-btn" onclick="resetClocks()">🔄 Zurücksetzen</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="footer">
            💡 Klick auf eine Uhr zum Löschen | Live aktualisiert alle Sekunde
        </div>
    </div>

    <script>
        // Vordefinierte Zeitzonen
        const PREDEFINED_ZONES = [
            { name: 'Berlin (CET)', offset: 1 },
            { name: 'London (GMT)', offset: 0 },
            { name: 'New York (EST)', offset: -5 },
            { name: 'Los Angeles (PST)', offset: -8 },
            { name: 'Tokio (JST)', offset: 9 },
            { name: 'Sydney (AEDT)', offset: 11 },
            { name: 'Dubai (GST)', offset: 4 },
            { name: 'Mumbai (IST)', offset: 5.5 },
            { name: 'Hongkong (HKT)', offset: 8 },
            { name: 'Singapur (SGT)', offset: 8 },
            { name: 'Bangkok (ICT)', offset: 7 },
            { name: 'Bangkok (ICT)', offset: 7 },
            { name: 'Toronto (EST)', offset: -5 },
            { name: 'São Paulo (BRT)', offset: -3 },
            { name: 'Moskau (MSK)', offset: 3 },
            { name: 'Istanbul (EET)', offset: 3 },
            { name: 'Johannesburg (SAST)', offset: 2 },
            { name: 'Auckland (NZDT)', offset: 13 }
        ];

        let customZones = [];

        // LocalStorage laden
        function loadFromStorage() {
            const stored = localStorage.getItem('customZones');
            if (stored) {
                try {
                    customZones = JSON.parse(stored);
                } catch (e) {
                    customZones = [];
                }
            } else {
                customZones = PREDEFINED_ZONES.slice(0, 6); // Standard: erste 6
                saveToStorage();
            }
        }

        // In LocalStorage speichern
        function saveToStorage() {
            localStorage.setItem('customZones', JSON.stringify(customZones));
        }

        // Zeitzone hinzufügen
        function addTimezone() {
            const input = document.getElementById('tzInput');
            const offset = parseFloat(input.value);

            if (isNaN(offset) || offset < -12 || offset > 14) {
                alert('Bitte gib einen gültigen UTC-Offset ein (-12 bis +14)');
                return;
            }

            // Zonen-Name generieren
            const sign = offset >= 0 ? '+' : '';
            const name = `UTC ${sign}${offset}`;

            // Prüfen, ob bereits vorhanden
            if (customZones.some(z => z.offset === offset)) {
                alert('Diese Zeitzone existiert bereits!');
                return;
            }

            customZones.push({ name, offset });
            saveToStorage();
            updateClocks();
            input.value = '';
        }

        // Zeitzone löschen
        function removeTimezone(index) {
            if (confirm(`Zeitzone "${customZones[index].name}" wirklich löschen?`)) {
                customZones.splice(index, 1);
                saveToStorage();
                updateClocks();
            }
        }

        // Zurücksetzen
        function resetClocks() {
            if (confirm('Alle Zeitzonen auf Standard zurücksetzen?')) {
                customZones = PREDEFINED_ZONES.slice(0, 6);
                saveToStorage();
                updateClocks();
            }
        }

        // Zeit formatieren
        function formatTime(date, format) {
            if (format === '12') {
                return date.toLocaleString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
            } else {
                return date.toLocaleString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            }
        }

        // Datum formatieren
        function formatDate(date) {
            return date.toLocaleString('de-DE', {
                weekday: 'short',
                year: '2-digit',
                month: '2-digit',
                day: '2-digit'
            });
        }

        // Uhren aktualisieren
        function updateClocks() {
            const format = document.querySelector('input[name="format"]:checked').value;
            const grid = document.getElementById('clocksGrid');

            if (customZones.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>📍 Keine Zeitzonen hinzugefügt</p>
                        <p style="font-size: 0.9em; opacity: 0.8;">Nutze das Formular oben, um Zeitzonen hinzuzufügen</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = customZones.map((zone, index) => {
                // UTC Zeit
                const utcDate = new Date();
                // Lokale Zeit mit Offset
                const localDate = new Date(utcDate.getTime() + zone.offset * 60 * 60 * 1000);

                const timeStr = formatTime(localDate, format);
                const dateStr = formatDate(localDate);
                const offsetStr = `UTC ${zone.offset >= 0 ? '+' : ''}${zone.offset}`;

                return `
                    <div class="clock-card" onclick="removeTimezone(${index})">
                        <div class="city-name">${zone.name}</div>
                        <div class="date-display">${dateStr}</div>
                        <div class="time-display">${timeStr}</div>
                        <div class="utc-offset">${offsetStr}</div>
                        <div class="delete-hint">❌ Klick zum Löschen</div>
                    </div>
                `;
            }).join('');
        }

        // Enter-Taste zum Hinzufügen
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            updateClocks();

            document.getElementById('tzInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTimezone();
            });

            // Jede Sekunde aktualisieren
            setInterval(updateClocks, 1000);

            // Format-Änderung
            document.querySelectorAll('input[name="format"]').forEach(radio => {
                radio.addEventListener('change', updateClocks);
            });
        });
    </script>
</body>
</html>
